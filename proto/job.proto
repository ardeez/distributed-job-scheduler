syntax = "proto3";

package herschel.v1;

option go_package = "github.com/ardeez/distributed-job-scheduler/internal/transport/pb";

import "google/protobuf/timestamp.proto";

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING     = 1;
  JOB_STATUS_SCHEDULED   = 2;
  JOB_STATUS_DISPATCHED  = 3;
  JOB_STATUS_RUNNING     = 4;
  JOB_STATUS_COMPLETED   = 5;
  JOB_STATUS_FAILED      = 6;
  JOB_STATUS_RETRY       = 7;
  JOB_STATUS_DEAD        = 8;
  JOB_STATUS_CANCELLED   = 9;
}

message Job {
    string id = 1;
    string name = 2;
    string cron_expr = 3;
    bytes payload = 4;
    int32 max_retries = 5;
    int32 timeout_seconds = 6;
    JobStatus status = 7;
    google.protobuf.Timestamp next_run_at = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
}

message JobExecution {
    string id = 1;
    string job_id = 2;
    string worker_id = 3;
    int32 attempt = 4;
    JobStatus status = 5;
    string error_message = 6;
    google.protobuf.Timestamp started_at = 7;
    google.protobuf.Timestamp finished_at = 8;
}


message SubmitJobRequest {
  string name            = 1;
  string cron_expr       = 2;
  bytes  payload         = 3;
  int32  max_retries     = 4;
  int32  timeout_seconds = 5;
}

message SubmitJobResponse {
  Job job = 1;
}

message GetJobStatusRequest {
    string job_id = 1;
}

message GetJobStatusResponse {
    Job job = 1;
    repeated JobExecution executions = 2;
}

message ListJobsRequest {
    JobStatus status_filter = 1;
    int32 limit = 2;
    string page_token    = 3;
}

message ListJobsResponse {
    repeated Job jobs = 1;
    string next_page_token = 2;
}

message CancelJobRequest {
    string job_id = 1;
}

message CancelJobResponse {
    Job job = 1;
}

message ListDeadJobsRequest {
    int32 limit = 1;
    string page_token = 2;
}

message ListDeadJobsResponse {
    repeated Job jobs = 1;
    string next_page_token = 2;
}

message RetryDeadJobRequest {
    string job_id = 1;
}

message RetryDeadJobResponse {
    Job job = 1;
}

service JobService {
    rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
    rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
    rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
    rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
    rpc ListDeadJobs(ListDeadJobsRequest) returns (ListDeadJobsResponse);
    rpc RetryDeadJob(RetryDeadJobRequest) returns (RetryDeadJobResponse);
}