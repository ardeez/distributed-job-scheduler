syntax = "proto3";

package herschel.v1;

option go_package = "github.com/ardeez/distributed-job-scheduler/internal/transport/pb";

import "google/protobuf/timestamp.proto";

enum WorkerStatus {
    WORKER_STATUS_UNSPECIFIED = 0;
    WORKER_STATUS_IDLE = 1;
    WORKER_STATUS_BUSY = 2;
    WORKER_STATUS_DRAINING = 3;
    WORKER_STATUS_DEAD = 4;
}

message WorkerInfo {
    string id = 1;
    string hostname = 2;
    int32 max_concurrent_jobs = 3;
    int32 current_running_jobs = 4;
    WorkerStatus status = 5;
    google.protobuf.Timestamp last_heartbeat = 6;
    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;
}

message RegisterWorkerRequest {
    string hostname = 1;
    int32 max_concurrent_jobs = 2;
}

message RegisterWorkerResponse {
    string worker_id = 1;
    string message = 2;
}

message HeartbeatRequest {
    string worker_id = 1;
    int32 current_jobs = 2;
    WorkerStatus status = 3;
}

message HeartbeatResponse {
    bool acknowledged = 1;
    string command = 2;
}

message DispatchJobRequest {
    string worker_id = 1;
    int32 capacity = 2;
}

message DispatchJobResponse {
   string job_id = 1;
   string job_name = 2;
   bytes payload = 3;
   int32 timeout_seconds = 4;
   int32 attempt = 5;
   string execution_id = 6;
}

message ReportResultRequest {
    string execution_id = 1;
    string job_id = 2;
    string worker_id = 3;
    bool success = 4;
    string error_message = 5;
    int64 duration_ms = 6;
}

message ReportResultResponse {
    bool acknowledged = 1;
    string next_action = 2;
}



service WorkerService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);
  rpc DispatchJob(stream DispatchJobRequest) returns (stream DispatchJobResponse);
  rpc ReportResult(ReportResultRequest) returns (ReportResultResponse);
}